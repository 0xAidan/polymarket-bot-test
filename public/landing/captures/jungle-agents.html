<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1100">
  <title>Ditto Jungle Agents capture</title>
  <style>html { background: #161721; }</style>
  <link rel="stylesheet" href="/shared/jungle-brand.css">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/landing/captures/capture.css">
</head>
<body class="grid-pattern landing-capture">
  <div class="app-shell j-app landing-capture-app">
    <header class="j-topbar">
      <div class="j-topbar-brand">
        <div class="j-topbar-mark" aria-hidden="true"><img src="/shared/logo-gold.png" alt="" class="j-topbar-logo"></div>
        <div>
          <div class="j-topbar-eyebrow">DITTO</div>
          <div class="j-topbar-title font-serif">Ditto</div>
        </div>
      </div>
      <nav class="j-nav" aria-label="Primary">
        <button type="button" class="j-nav-btn">Home</button>
        <button type="button" class="j-nav-btn active">Jungle Agents</button>
        <button type="button" class="j-nav-btn">Copy List</button>
        <button type="button" class="j-nav-btn">My Wallets</button>
      </nav>
    </header>
    <main class="j-main">
      <div class="jw-body">
        <div class="jw-tab-panel active j-page j-agents-tab">
          <header class="j-page-header">
            <div>
              <p class="j-dash-eyebrow">Curated roster</p>
              <h1 class="font-serif j-page-title">Jungle Agents</h1>
              <p class="j-page-sub">Curated agents you can follow on Polymarket with one click.</p>
            </div>
          </header>
          <div class="j-agent-roster">
            <div class="j-panel j-agents-table-panel">
              <div class="j-agents-table-scroll">
                <table class="jw-listview j-agents-table">
                  <thead>
                    <tr>
                      <th>Agent</th>
                      <th>Portfolio</th>
                      <th>PnL</th>
                      <th>ROI</th>
                      <th>W/L</th>
                      <th>Win%</th>
                      <th>Pos</th>
                      <th>Wallet</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>
                        <div class="j-agents-cell-agent">
                          <div class="j-agents-avatar-sm"><span class="j-agents-avatar-fallback">M</span></div>
                          <div><strong>Macro Maven</strong><div class="text-sm text-muted">Politics · Macro</div></div>
                        </div>
                      </td>
                      <td>$124k</td>
                      <td class="positive">+$48.2k</td>
                      <td>18%</td>
                      <td>142/86</td>
                      <td>62%</td>
                      <td>12</td>
                      <td><code class="text-sm">0x7a3f…c42d</code></td>
                      <td><button type="button" class="j-btn j-btn-primary j-btn-sm">Copy</button></td>
                    </tr>
                    <tr>
                      <td>
                        <div class="j-agents-cell-agent">
                          <div class="j-agents-avatar-sm"><span class="j-agents-avatar-fallback">S</span></div>
                          <div><strong>Sports Edge</strong><div class="text-sm text-muted">Sports · Live</div></div>
                        </div>
                      </td>
                      <td>$41k</td>
                      <td class="positive">+$12.7k</td>
                      <td>11%</td>
                      <td>88/64</td>
                      <td>58%</td>
                      <td>8</td>
                      <td><code class="text-sm">0x2b91…f03a</code></td>
                      <td><button type="button" class="j-btn j-btn-primary j-btn-sm">Copy</button></td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
